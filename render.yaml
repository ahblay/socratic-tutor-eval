services:
  - type: web
    name: socratic-tutor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: socratic-tutor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: socratic-tutor-db
    databaseName: socratic_tutor
    plan: free
