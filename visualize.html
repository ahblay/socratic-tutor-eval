<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knowledge Graph — Socratic Tutor Session</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f172a; color: #e2e8f0; height: 100vh;
         display: flex; flex-direction: column; overflow: hidden; }

  /* ── header ── */
  header { padding: 10px 20px; background: #1e293b; border-bottom: 1px solid #334155;
           display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase;
              letter-spacing: .08em; }
  .turn-badge { background: #3b82f6; color: #fff; font-size: 13px; font-weight: 700;
                padding: 2px 10px; border-radius: 99px; }
  .file-label { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .file-btn { background: #334155; border: 1px solid #475569; color: #94a3b8;
              border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px;
              white-space: nowrap; }
  .file-btn:hover { background: #475569; color: #e2e8f0; }
  #file-name { font-size: 11px; color: #64748b; max-width: 220px; overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; }
  input[type=file] { display: none; }

  /* ── main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── graph panel ── */
  .graph-wrap { flex: 0 0 54%; display: flex; flex-direction: column;
                border-right: 1px solid #1e293b; }
  .graph-title { font-size: 11px; color: #64748b; text-transform: uppercase;
                 letter-spacing: .1em; padding: 8px 16px 4px; flex-shrink: 0; }
  svg#kg { flex: 1; width: 100%; }

  /* ── side panel ── */
  .side { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .dialogue { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex;
              flex-direction: column; gap: 10px; }
  .bubble { border-radius: 8px; padding: 10px 13px; font-size: 13px; line-height: 1.55;
            max-width: 100%; }
  .bubble.tutor  { background: #1e3a5f; border-left: 3px solid #3b82f6; color: #bfdbfe; }
  .bubble.student{ background: #1e293b; border-left: 3px solid #475569; color: #cbd5e1; }
  .bubble-label  { font-size: 10px; font-weight: 700; letter-spacing: .08em;
                   text-transform: uppercase; color: #64748b; margin-bottom: 4px; }
  .empty-state   { color: #475569; font-size: 13px; font-style: italic;
                   margin: auto; text-align: center; padding: 20px; }

  /* ── observations ── */
  .obs-section { padding: 8px 16px; border-top: 1px solid #1e293b; flex-shrink: 0; }
  .obs-title { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase;
               letter-spacing: .08em; margin-bottom: 6px; }
  .obs-list { display: flex; flex-wrap: wrap; gap: 5px; min-height: 22px; }
  .obs-chip { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600;
              display: flex; align-items: center; gap: 4px; }

  /* ── mastery bars ── */
  .mastery-section { padding: 8px 16px 10px; border-top: 1px solid #1e293b;
                     flex-shrink: 0; background: #0f172a; }
  .mastery-title { font-size: 10px; font-weight: 700; color: #64748b;
                   text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .bar-label { font-size: 11px; color: #94a3b8; width: 160px; flex-shrink: 0;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; background: #1e293b; border-radius: 99px; height: 8px;
               overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease, background .5s ease; }
  .bar-val { font-size: 10px; color: #64748b; width: 36px; text-align: right; flex-shrink: 0; }

  /* ── timeline ── */
  .timeline { background: #1e293b; border-top: 1px solid #334155; padding: 10px 20px;
              display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .tl-label { font-size: 11px; color: #64748b; white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: #3b82f6; cursor: pointer; }
  .tl-btn { background: #334155; border: none; color: #94a3b8; border-radius: 6px;
            padding: 4px 10px; cursor: pointer; font-size: 13px; }
  .tl-btn:hover { background: #475569; color: #e2e8f0; }
  .tl-ticks { display: flex; justify-content: space-between; font-size: 10px;
              color: #475569; padding: 0 2px; flex: 1; pointer-events: none; }

  /* ── SVG node animations ── */
  @keyframes pulse { 0%,100%{stroke-opacity:.9;stroke-width:3} 50%{stroke-opacity:.4;stroke-width:5} }
  .frontier-ring { animation: pulse 1.6s ease-in-out infinite; }

  /* ── no-data overlay ── */
  #no-data { position: absolute; inset: 0; display: flex; flex-direction: column;
             align-items: center; justify-content: center; gap: 16px;
             background: #0f172a; z-index: 10; }
  #no-data h2 { font-size: 16px; color: #94a3b8; font-weight: 500; }
  #no-data p  { font-size: 13px; color: #475569; }
  #no-data .nd-btn { background: #3b82f6; color: #fff; border: none; border-radius: 8px;
                     padding: 8px 20px; font-size: 14px; cursor: pointer; }
  #no-data .nd-btn:hover { background: #2563eb; }
</style>
</head>
<body>

<header>
  <h1>Socratic Tutor · Knowledge Graph Evolution</h1>
  <span class="turn-badge" id="hdr-turn">—</span>
  <span style="font-size:12px;color:#64748b;" id="hdr-frontier"></span>
  <div class="file-label">
    <span id="file-name">No file loaded</span>
    <label class="file-btn" for="file-input">Load run file…</label>
    <input type="file" id="file-input" accept=".jsonl">
  </div>
</header>

<div class="main">

  <!-- ── Graph ── -->
  <div class="graph-wrap">
    <div class="graph-title">Bayesian knowledge state · target subgraph</div>
    <svg id="kg" viewBox="0 0 560 560" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- ── Side panel ── -->
  <div class="side">
    <div class="dialogue" id="dialogue">
      <div class="empty-state">Load a run file to begin</div>
    </div>

    <div class="obs-section">
      <div class="obs-title">Observations this turn</div>
      <div class="obs-list" id="obs-list"></div>
    </div>

    <div class="mastery-section">
      <div class="mastery-title">Target KC mastery</div>
      <div id="bars"></div>
    </div>
  </div>
</div>

<!-- ── Timeline ── -->
<div class="timeline">
  <span class="tl-label">Turn</span>
  <button class="tl-btn" id="btn-prev">&#8592;</button>
  <div style="flex:1;display:flex;flex-direction:column;gap:3px;">
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
    <div class="tl-ticks" id="tl-ticks"></div>
  </div>
  <button class="tl-btn" id="btn-next">&#8594;</button>
</div>

<!-- ── No-data overlay ── -->
<div id="no-data">
  <h2>Socratic Tutor · Knowledge Graph Viewer</h2>
  <p>Select a <code>.jsonl</code> run file from the <code>runs/</code> directory</p>
  <button class="nd-btn" onclick="document.getElementById('file-input').click()">
    Load run file…
  </button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// HARDCODED TOPOLOGY  (Junyi Academy subgraph)
// ─────────────────────────────────────────────────────────────────────────────

const KC_LABELS = {
  'addition-subtraction':    'Addition &\nSubtraction',
  'order-of-operations':     'Order of\nOperations',
  'multiplication-division': 'Multiplication\n& Division',
  'factors-multiples':       'Factors &\nMultiples',
  'fractions':               'Fractions',
  'rates-and-ratios':        'Rates &\nRatios',
  'ratio-percentage':        'Ratio &\nPercentage',
};

// prereq: true  → displayed as a prerequisite (mastered at session start)
// prereq: false → target KC (what the tutor is teaching)
const NODES = {
  'addition-subtraction':    { x: 130, y: 75,  r: 34, prereq: true  },
  'order-of-operations':     { x: 430, y: 75,  r: 34, prereq: true  },
  'multiplication-division': { x: 130, y: 195, r: 34, prereq: true  },
  'factors-multiples':       { x: 130, y: 315, r: 38, prereq: false },
  'fractions':               { x: 280, y: 415, r: 42, prereq: false },
  'rates-and-ratios':        { x: 150, y: 510, r: 38, prereq: false },
  'ratio-percentage':        { x: 410, y: 510, r: 38, prereq: false },
};

const EDGES = [
  ['addition-subtraction',    'multiplication-division'],
  ['multiplication-division', 'factors-multiples'],
  ['factors-multiples',       'fractions'],
  ['order-of-operations',     'fractions'],
  ['fractions',               'rates-and-ratios'],
  ['fractions',               'ratio-percentage'],
];

const TARGET_KCS  = Object.keys(NODES).filter(k => !NODES[k].prereq);
const DISPLAY_KCS = Object.keys(NODES);

// ─────────────────────────────────────────────────────────────────────────────
// DYNAMIC STATE
// ─────────────────────────────────────────────────────────────────────────────

let TURNS = [];   // populated by loadFile()

// ─────────────────────────────────────────────────────────────────────────────
// COLOUR HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function masteryColor(p) {
  if (p <= 0.15) return '#334155';
  const stops = [
    [0.15, [51,  65, 85]],
    [0.40, [146,109,  5]],
    [0.70, [101,163, 13]],
    [1.00, [ 34,197, 94]],
  ];
  for (let i = 1; i < stops.length; i++) {
    const [t1, c1] = stops[i-1];
    const [t2, c2] = stops[i];
    if (p <= t2) {
      const t = (p - t1) / (t2 - t1);
      const r = Math.round(c1[0] + t*(c2[0]-c1[0]));
      const g = Math.round(c1[1] + t*(c2[1]-c1[1]));
      const b = Math.round(c1[2] + t*(c2[2]-c1[2]));
      return `rgb(${r},${g},${b})`;
    }
  }
  return 'rgb(34,197,94)';
}

const OBS_META = {
  strong_articulation: { label: 'Strong articulation',    bg: '#14532d', fg: '#86efac' },
  weak_articulation:   { label: 'Emerging understanding', bg: '#713f12', fg: '#fde68a' },
  guided_recognition:  { label: 'Guided recognition',     bg: '#7c2d12', fg: '#fdba74' },
  misconception:       { label: 'Misconception',          bg: '#7f1d1d', fg: '#fca5a5' },
  absent:              { label: 'Not engaged',            bg: '#1e293b', fg: '#94a3b8' },
  contradiction:       { label: 'Contradiction',          bg: '#581c87', fg: '#d8b4fe' },
};

// ─────────────────────────────────────────────────────────────────────────────
// SVG GRAPH  (built once; colours updated on each render)
// ─────────────────────────────────────────────────────────────────────────────

const svg = document.getElementById('kg');
const NS  = 'http://www.w3.org/2000/svg';

function el(tag, attrs, children) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs||{})) e.setAttribute(k, v);
  for (const c of (children||[])) e.appendChild(c);
  return e;
}

const defs = el('defs');
const marker = el('marker', { id:'arrow', markerWidth:'8', markerHeight:'8',
  refX:'6', refY:'3', orient:'auto' });
marker.appendChild(el('path', { d:'M0,0 L0,6 L8,3 z', fill:'#475569' }));
defs.appendChild(marker);
svg.appendChild(defs);

const edgeLayer = el('g', { id: 'edges' });
svg.appendChild(edgeLayer);
for (const [from, to] of EDGES) {
  const n1 = NODES[from], n2 = NODES[to];
  const dx = n2.x - n1.x, dy = n2.y - n1.y;
  const dist = Math.hypot(dx, dy);
  const sx = n1.x + dx/dist*n1.r, sy = n1.y + dy/dist*n1.r;
  const ex = n2.x - dx/dist*(n2.r+8), ey = n2.y - dy/dist*(n2.r+8);
  edgeLayer.appendChild(el('line', {
    x1:sx, y1:sy, x2:ex, y2:ey,
    stroke:'#475569', 'stroke-width':'1.5',
    'marker-end':'url(#arrow)',
  }));
}

const nodeLayer = el('g', { id: 'nodes' });
svg.appendChild(nodeLayer);

const nodeEls = {};

for (const [id, n] of Object.entries(NODES)) {
  const g = el('g', { transform: `translate(${n.x},${n.y})` });
  const ring = el('circle', {
    r: n.r + 7, fill: 'none',
    stroke: '#f59e0b', 'stroke-width': '3',
    opacity: '0', class: 'frontier-ring',
  });
  const circle = el('circle', {
    r: n.r, fill: '#1e293b',
    stroke: n.prereq ? '#475569' : '#64748b',
    'stroke-width': n.prereq ? '1.5' : '2',
    style: 'transition: fill .5s ease, stroke .5s ease',
  });
  const lines = (KC_LABELS[id]||id).split('\n');
  const textG = el('g');
  const dy = lines.length > 1 ? -7 : 0;
  lines.forEach((line, i) => {
    textG.appendChild(el('text', {
      x:'0', y: String(dy + i*14),
      'text-anchor':'middle', 'dominant-baseline':'middle',
      fill: '#e2e8f0',
      'font-size': n.prereq ? '9' : '10',
      'font-weight': n.prereq ? '400' : '600',
      'pointer-events': 'none',
    }, [document.createTextNode(line)]));
  });
  g.appendChild(ring);
  g.appendChild(circle);
  g.appendChild(textG);
  nodeLayer.appendChild(g);
  nodeEls[id] = { circle, ring };
}

// ─────────────────────────────────────────────────────────────────────────────
// MASTERY BARS  (rebuilt whenever a new file is loaded)
// ─────────────────────────────────────────────────────────────────────────────

const barsEl   = document.getElementById('bars');
let   barFills = {};

function buildBars() {
  barsEl.innerHTML = '';
  barFills = {};
  for (const kc of TARGET_KCS) {
    const label = (KC_LABELS[kc]||kc).replace('\n',' ');
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" id="bar-${kc}" style="width:0%;background:#334155"></div></div>
      <span class="bar-val" id="barval-${kc}">—</span>
    `;
    barsEl.appendChild(row);
    barFills[kc] = {
      fill: document.getElementById(`bar-${kc}`),
      val:  document.getElementById(`barval-${kc}`),
    };
  }
}
buildBars();

// ─────────────────────────────────────────────────────────────────────────────
// JSONL LOADER
// ─────────────────────────────────────────────────────────────────────────────

function computeInitialFrontier(bkt) {
  // Build prerequisite map from hardcoded EDGES
  const prereqMap = {};
  for (const [from, to] of EDGES) {
    if (!prereqMap[to]) prereqMap[to] = [];
    prereqMap[to].push(from);
  }
  return TARGET_KCS.filter(kc => {
    if ((bkt[kc] ?? 0.1) >= 0.7) return false;  // already mastered
    const prereqs = prereqMap[kc] || [];
    return prereqs.every(p => (bkt[p] ?? 0.1) > 0.7);
  });
}

function buildTurns(entries) {
  if (!entries.length) return;

  // Derive initial BKT from first turn's data.
  // For KCs with no observation in turn 1, first-turn value ≈ initial value
  // (absent drift is < 0.002 per turn).
  // For KCs with observations, reverse-engineer: >= 0.8 → was mastered (0.9),
  // >= 0.4 → was partial (0.5), else → was absent (0.1).
  const firstSnap = entries[0].evaluator_snapshot?.updated_bkt || {};
  const firstObsKCs = new Set(
    (entries[0].evaluator_snapshot?.observations || []).map(o => o.kc_id)
  );

  const initialBkt = {};
  for (const kc of DISPLAY_KCS) {
    const v = firstSnap[kc] ?? 0.1;
    initialBkt[kc] = v >= 0.8 ? 0.9 : v >= 0.4 ? 0.5 : 0.1;
  }

  TURNS = [
    {
      turn: 0, label: 'Initial',
      bkt: initialBkt,
      frontier: computeInitialFrontier(initialBkt),
      student: null, tutor: null, observations: [],
    },
    ...entries.map(e => {
      const snap = e.evaluator_snapshot || {};
      const bkt  = {};
      for (const kc of DISPLAY_KCS) {
        bkt[kc] = snap.updated_bkt?.[kc] ?? 0.1;
      }
      const observations = (snap.observations || [])
        .filter(o => NODES[o.kc_id])          // only KCs we display
        .map(o => ({
          kc:    o.kc_id,
          cls:   o.observation_class,
          quote: o.evidence_quote || '',
        }));
      return {
        turn: e.turn,
        label: `Turn ${e.turn}`,
        bkt,
        frontier: (snap.knowledge_frontier || []).filter(k => NODES[k]),
        student:  e.student_message  || null,
        tutor:    e.tutor_response   || null,
        observations,
      };
    }),
  ];
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const lines   = evt.target.result.trim().split('\n').filter(Boolean);
      const entries = lines.map(l => JSON.parse(l));
      buildTurns(entries);
      initUI(file.name);
    } catch (err) {
      alert('Could not parse file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────

function render(turnIdx) {
  if (!TURNS.length) return;
  const data   = TURNS[turnIdx];
  const nTurns = TURNS.length - 1;  // excludes initial state

  // Header
  document.getElementById('hdr-turn').textContent =
    turnIdx === 0 ? 'Initial state' : `Turn ${data.turn} / ${nTurns}`;
  document.getElementById('hdr-frontier').textContent =
    data.frontier.length
      ? 'Frontier: ' + data.frontier.map(k => (KC_LABELS[k]||k).replace('\n',' ')).join(', ')
      : '';

  // Node colours + frontier rings
  for (const [id, els] of Object.entries(nodeEls)) {
    const p = data.bkt[id] ?? 0.1;
    els.circle.style.fill   = masteryColor(p);
    els.circle.style.stroke = NODES[id].prereq ? '#475569' : '#94a3b8';
    els.ring.setAttribute('opacity', data.frontier.includes(id) ? '1' : '0');
  }

  // Mastery bars
  for (const kc of TARGET_KCS) {
    const bf = barFills[kc];
    if (!bf) continue;
    const p   = data.bkt[kc] ?? 0.1;
    const pct = Math.round(p * 100);
    bf.fill.style.width      = pct + '%';
    bf.fill.style.background = masteryColor(p);
    bf.val.textContent       = p.toFixed(2);
  }

  // Dialogue
  const dlg = document.getElementById('dialogue');
  if (!data.tutor && !data.student) {
    dlg.innerHTML = `<div class="empty-state">← Session not yet started<br>
      <small>Advance the slider to begin</small></div>`;
  } else {
    dlg.innerHTML = `
      <div class="bubble student">
        <div class="bubble-label">Student</div>
        ${escHtml(data.student)}
      </div>
      <div class="bubble tutor">
        <div class="bubble-label">Tutor</div>
        ${escHtml(data.tutor)}
      </div>
    `;
  }

  // Observations
  const obsList = document.getElementById('obs-list');
  obsList.innerHTML = '';
  if (!data.observations.length) {
    obsList.innerHTML = '<span style="font-size:11px;color:#475569;font-style:italic">None recorded</span>';
  } else {
    for (const obs of data.observations) {
      const meta = OBS_META[obs.cls] || OBS_META.absent;
      const chip = document.createElement('span');
      chip.className = 'obs-chip';
      chip.style.background = meta.bg;
      chip.style.color       = meta.fg;
      chip.title = obs.quote;
      chip.textContent = `${(KC_LABELS[obs.kc]||obs.kc).replace('\n',' ')} · ${meta.label}`;
      obsList.appendChild(chip);
    }
  }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────────────────────────

const slider = document.getElementById('slider');

function initUI(filename) {
  // Hide overlay
  document.getElementById('no-data').style.display = 'none';

  // Update filename display
  document.getElementById('file-name').textContent = filename;

  // Update slider
  const max = TURNS.length - 1;
  slider.max   = max;
  slider.value = 0;

  // Rebuild tick labels
  const ticks = document.getElementById('tl-ticks');
  ticks.innerHTML = '';
  for (let i = 0; i <= max; i++) {
    const t = document.createElement('span');
    t.textContent = i === 0 ? 'Init' : i;
    ticks.appendChild(t);
  }

  render(0);
}

slider.addEventListener('input', () => render(parseInt(slider.value)));

document.getElementById('btn-prev').addEventListener('click', () => {
  const v = Math.max(0, parseInt(slider.value) - 1);
  slider.value = v; render(v);
});
document.getElementById('btn-next').addEventListener('click', () => {
  const v = Math.min(parseInt(slider.max), parseInt(slider.value) + 1);
  slider.value = v; render(v);
});
</script>
</body>
</html>
